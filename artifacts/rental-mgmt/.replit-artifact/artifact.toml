kind = "web"
previewPath = "/"
title = "Rental Management System"
version = "1.0.0"
id = "artifacts/rental-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25093

[services.development]
run = "pnpm --filter @workspace/rental-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rental-mgmt", "run", "build" ]
publicDir = "artifacts/rental-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25093"
BASE_PATH = "/"
